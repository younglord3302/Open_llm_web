version: '3.8'

services:
  openllm-ui:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - openllm-data:/app/workspace
      - openllm-db:/app/db-data
    environment:
      - PORT=5000
      - JWT_SECRET=change-this-in-production
    restart: unless-stopped

  # Optional: Ollama service (uncomment if you want Ollama in Docker)
